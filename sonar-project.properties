# Replace with your SonarCloud organization and project key.
# Project key format: <github-org>_<repo-name>
sonar.projectKey=YOUR_GITHUB_ORG_monorepo-template
sonar.organization=YOUR_GITHUB_ORG

sonar.projectName=monorepo-template
sonar.sources=apps,packages
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/migrations/**,\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/*.e2e-spec.ts,\
  **/playwright-report/**,\
  **/test-results/**

sonar.tests=apps,packages
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.e2e-spec.ts

# Coverage reports — generated by `pnpm test --coverage`
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.typescript.tsconfigPath=tsconfig.json
