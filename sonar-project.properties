# Replace with your SonarCloud organization and project key.
# Project key format: <github-org>_<repo-name>
sonar.projectKey=YOUR_GITHUB_ORG_monorepo-template
sonar.organization=YOUR_GITHUB_ORG

sonar.projectName=monorepo-template
sonar.sources=apps,packages
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/migrations/**,\
  **/playwright-report/**,\
  **/test-results/**

sonar.tests=apps,packages
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.e2e-spec.ts,**/*.spec.tsx,**/*.test.tsx

# Coverage reports — generated by Rstest across all packages and apps

sonar.javascript.lcov.reportPaths=apps/*/coverage/lcov.info,packages/*/coverage/lcov.info
