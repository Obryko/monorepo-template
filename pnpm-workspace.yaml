packages:
  - "packages/*"
  - "apps/*"

allowBuilds:
  '@nestjs/core': false
  '@scarf/scarf': false
  '@swc/core': true
  cpu-features: false
  esbuild: true
  protobufjs: false
  ssh2: false
  unrs-resolver: true

catalog:
  "@biomejs/biome": ^2.5.0
  "@rstest/core": ^0.10.3
  "@rstest/coverage-istanbul": ^0.10.3
  "@storybook/addon-essentials": ^8.0.0
  "@storybook/react": ^10.4.4
  "@storybook/react-vite": ^8.0.0
  "@tailwindcss/vite": ^4.0.0
  "@types/node": ^26.0.0
  h3: ^2.0.1-rc.22
  storybook: ^10.4.4
  tsdown: ^0.22.3
  typescript: ^6.0.3
  vite: ^8.0.16
  zod: ^4.4.3

overrides:
  h3: ">=2.0.1-rc.18 <3.0.0-0"
  srvx: ">=0.11.13 <1.0.0-0"
  protobufjs: ">=8.2.0 <9.0.0"
  undici: ">=6.24.0 <8.0.0-0"
  uuid: ">=11.1.1 <15.0.0-0"
  esbuild: ">=0.25.0 <1.0.0-0"

minimumReleaseAgeExclude:
  - '@types/react@19.2.16'
  - react-dom@19.2.7
  - react@19.2.7
  - nitro-nightly@3.0.1-20260604-184855-0a07991c
