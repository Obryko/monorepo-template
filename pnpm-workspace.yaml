packages:
  - "packages/*"
  - "apps/*"

allowBuilds:
  '@nestjs/core': false
  '@scarf/scarf': false
  '@swc/core': true
  esbuild: true
  protobufjs: false
  unrs-resolver: true

catalog:
  "@biomejs/biome": ^2.4.16
  "@types/node": ^24.12.4
  vitest: ^4.1.8
  tsdown: ^0.22.1
  typescript: ^6.0.3
  zod: ^4.4.3

minimumReleaseAgeExclude:
  - '@types/react@19.2.16'
  - react-dom@19.2.7
  - react@19.2.7
