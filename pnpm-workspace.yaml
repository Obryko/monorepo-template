packages:
  - "packages/*"
  - "apps/*"

allowBuilds:
  '@nestjs/core': false
  '@scarf/scarf': false
  '@swc/core': true
  esbuild: true
  protobufjs: false
  unrs-resolver: true

catalog:
  "@biomejs/biome": ^2.4.16
  "@rstest/core": ^0.10.3
  "@types/node": ^25.9.1
  tsdown: ^0.22.1
  typescript: ^6.0.3
  zod: ^4.4.3

overrides:
  protobufjs: ">=8.2.0 <9.0.0"

minimumReleaseAgeExclude:
  - '@types/react@19.2.16'
  - react-dom@19.2.7
  - react@19.2.7
  - nitro-nightly@3.0.1-20260604-184855-0a07991c
