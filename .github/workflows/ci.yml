name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Check formatting and linting
        run: pnpm check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build internal packages
        run: pnpm build:internal

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build internal packages
        run: pnpm build:internal

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@04b047e8bb82a0c002c8312c1c880fbc6a999d45 # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            ./apps/api/coverage/lcov.info,
            ./apps/web/coverage/lcov.info,
            ./packages/contracts/coverage/lcov.info,
            ./packages/db/coverage/lcov.info,
            ./packages/env/coverage/lcov.info,
            ./packages/observability/coverage/lcov.info,
            ./packages/sentry/coverage/lcov.info,
            ./packages/ui/coverage/lcov.info
          fail_ci_if_error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-24.04
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run integration tests
        run: pnpm test:integration

  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: [lint, typecheck, test, integration]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build all packages and apps
        run: pnpm build

  api-e2e:
    name: API E2E
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build internal packages
        run: pnpm build:internal

      - name: Run API e2e tests
        run: pnpm --filter @monorepo-template/api test:e2e

  web-e2e:
    name: Web E2E
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build internal packages
        run: pnpm build:internal

      - name: Install Playwright browsers
        run: pnpm --filter @monorepo-template/web exec playwright install --with-deps chromium

      - name: Run Playwright e2e tests
        run: pnpm --filter @monorepo-template/web test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-test-results
          path: apps/web/test-results
          if-no-files-found: ignore
          retention-days: 7

  sonar:
    name: SonarCloud
    runs-on: ubuntu-24.04
    needs: [test]
    if: ${{ vars.SONAR_ENABLED == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
