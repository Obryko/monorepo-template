queue_rules:
  - name: default
    merge_conditions:
      - check-success=Lint
      - check-success=Typecheck
      - check-success=Test
      - check-success=Build
      - check-success=API E2E
      - check-success=Web E2E
pull_request_rules:
  - name: Automatic merge for Dependabot PRs
    conditions:
      - author=dependabot[bot]
      - check-success=Lint
      - check-success=Typecheck
      - check-success=Test
      - check-success=Build
      - check-success=API E2E
      - check-success=Web E2E
    actions:
      merge:
        method: squash
  - name: Add to merge queue when approved
    conditions:
      - check-success=Lint
      - check-success=Typecheck
      - check-success=Test
      - check-success=Build
      - check-success=API E2E
      - check-success=Web E2E
      - "#approved-reviews-by>=1"
      - label=ready-to-merge
    actions:
      queue:
        name: default
merge_protections:
  - name: Do not merge outdated PRs
    description: Make sure PRs are almost up to date before merging
    if:
      - base = main
    success_conditions:
      - "#commits-behind <= 10"
  - name: Enforce conventional commit
    description: Make sure that we follow https://www.conventionalcommits.org/en/v1.0.0/
    if:
      - base = main
    success_conditions:
      - "title ~=
        ^(fix|feat|docs|style|refactor|perf|test|build|ci|chore|revert)(?:\\(.+\
        \\))?:"
merge_protections_settings:
  auto_merge_conditions: true
